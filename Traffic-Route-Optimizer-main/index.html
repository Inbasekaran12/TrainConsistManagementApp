<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta information for character encoding and viewport settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Route Optimizer</title>
    <!-- Link to a CSS stylesheet for styling the web page -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header section for the page -->
    <header>
        <h1>Welcome to the Smart Traffic Route Optimizer</h1>
    </header>
    <!-- Main content area of the webpage -->
    <main>
        <section>
            <!-- Section for user input to generate routes -->
            <h2>Input Your Data</h2>
            <form id="route-form">
                <label for="origin">Origin:</label>
                <input type="text" id="origin" name="origin" required>
                <label for="destination">Destination:</label>
                <input type="text" id="destination" name="destination" required>
                <input type="submit" value="Find Route">
            </form>
        </section>
        <section>
            <!-- This section will display the optimized routes -->
            <h2>Optimized Route</h2>
            <div id="route-output">
                <!-- Route details will be populated here dynamically -->
            </div>
        </section>
    </main>
    <!-- Footer of the page for copyright information -->
    <footer>
        <p>&copy; 2026 Smart Traffic Route Optimizer</p>
    </footer>
    <!-- Link to JavaScript file for handling route optimization logic -->
    <script src="script.js"></script>
</body>
</html>
